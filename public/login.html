<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Fluo Diagnóstico</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar container">
        <a href="index.html" class="logo" style="color: var(--color-accent)">FLUO.</a>
    </nav>

    <div class="auth-container">
        <h2 class="text-center mb-4">Acessar Diagnóstico</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" class="form-control" required placeholder="Seu nome de usuário">
            </div>
            
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="form-control" required placeholder="Sua senha">
            </div>
            
            <button type="submit" class="btn" style="width: 100%">Entrar</button>
            <div class="error-message" id="errorMsg"></div>
        </form>
        
        <div class="text-center mt-4">
            <a href="index.html" style="font-size: 0.9rem; color: var(--color-text-muted)">Não tem acesso? Adquira agora.</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.textContent = '';
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    window.location.href = 'admin_dashboard.html';
                } else {
                    errorMsg.textContent = data.error || 'Erro ao fazer login.';
                }
            } catch (err) {
                errorMsg.textContent = 'Erro de conexão com o servidor.';
            }
        });
    </script>
</body>
</html>
